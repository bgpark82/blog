spring:
  profiles:
    include: db

server:
  tomcat:
    threads:
      max: 500
    accesslog:
      enabled: true

    min-spare-threads: 5
  compression:
    enabled: true
    mime-types: text/html,text/plain,text/css,application/javascript,application/json
    min-response-size: 1024

server.http2.enabled: true

